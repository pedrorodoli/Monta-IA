<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MontañIA - Campamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --sidebar-bg: #1a1b1e;
            --main-bg: #212529;
            --message-bot: #2c2e33;
            --montanero-green: #2d5a27;
            --montanero-light: #4a7c44;
        }
        body { background-color: var(--main-bg); color: #e9ecef; height: 100vh; display: flex; margin: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; overflow: hidden; }
        
        /* Hide scrollbars but keep functionality */
        * {
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }
        *::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        .sidebar { width: 260px; background-color: var(--sidebar-bg); display: flex; flex-direction: column; border-right: 1px solid #373a40; transition: transform 0.3s ease; z-index: 1000; }
        @media (max-width: 768px) { .sidebar { position: fixed; height: 100%; transform: translateX(-100%); width: 280px; } .sidebar.open { transform: translateX(0); } }
        
        .sidebar-header { padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .new-chat-btn { border: 1px solid #495057; background: transparent; color: white; padding: 10px; border-radius: 6px; text-align: left; transition: 0.2s; font-size: 0.9rem; }
        .new-chat-btn:hover { background: #2c2e33; border-color: var(--montanero-light); }
        
        .chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item { padding: 10px 12px; margin-bottom: 4px; border-radius: 6px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.85rem; color: #c5c5d2; transition: 0.2s; position: relative; }
        .chat-item:hover { background-color: #2c2e33; color: white; }
        .chat-item.active { background-color: #2c2e33; color: white; border-left: 3px solid var(--montanero-green); }
        
        .chat-item.external { border-left: 4px solid var(--montanero-light); background-color: rgba(74, 124, 68, 0.15); margin-top: 8px; margin-bottom: 8px; }
        .chat-item.external .owner-id { display: block; font-size: 0.7rem; color: var(--montanero-light); margin-top: 2px; font-style: italic; }

        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; height: 100vh; width: 100%; }
        .mobile-nav { display: none; padding: 10px; border-bottom: 1px solid #373a40; background-color: var(--main-bg); align-items: center; justify-content: space-between; }
        @media (max-width: 768px) { .mobile-nav { display: flex; } }
        .menu-toggle { background: transparent; border: none; color: white; font-size: 1.5rem; }

        .chat-container { flex: 1; overflow-y: auto; padding-bottom: 150px; }
        .message { padding: 1.5rem 1rem; display: flex; justify-content: center; width: 100%; }
        .message-inner { max-width: 800px; width: 100%; display: flex; gap: 1.5rem; }
        .assistant-message { background-color: var(--message-bot); }
        .avatar { width: 34px; height: 34px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1.1rem; }
        .user-avatar { background-color: #5436da; }
        .assistant-avatar { background-color: #00b300; color: white; }
        .content { flex: 1; line-height: 1.6; font-size: 1rem; color: #d1d1e0; overflow-wrap: break-word; }

        .typing-indicator-container { display: none; justify-content: center; padding: 15px; gap: 5px; }
        .dot { width: 8px; height: 8px; background-color: var(--montanero-light); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }

        .input-area { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, var(--main-bg) 30%); padding: 20px; }
        .input-wrapper { max-width: 800px; margin: 0 auto; position: relative; }
        .input-box { background-color: #373a40; border: 1px solid #495057; border-radius: 14px; padding: 14px 50px 14px 16px; width: 100%; color: white; resize: none; max-height: 200px; font-size: 1rem; }
        .input-box:focus { outline: none; border-color: var(--montanero-light); }
        .send-btn { position: absolute; right: 14px; bottom: 14px; background: transparent; border: none; color: #acacbe; }
        
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; }
        .sidebar-overlay.show { display: block; }
        
        .admin-badge { font-size: 0.6rem; background: var(--montanero-green); color: white; padding: 2px 5px; border-radius: 4px; margin-left: 10px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="px-3 pt-2 small text-secondary">
            <span id="admin-indicator" class="admin-badge" style="display:none">ADMIN</span>
        </div>
        <button class="new-chat-btn" onclick="createNewChat()">
            <i class="bi bi-plus-lg me-2"></i> Nuevo chat
        </button>
    </div>
    <div class="chat-list" id="chat-list"></div>
</div>

<div class="main-content">
    <div class="mobile-nav">
        <button class="menu-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
        <span class="fw-bold">MontañIA</span>
        <button class="menu-toggle" onclick="createNewChat()"><i class="bi bi-plus-lg"></i></button>
    </div>
    <div class="chat-container" id="chat-container"></div>
    <div class="input-area">
        <div class="typing-indicator-container" id="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="input-wrapper">
            <textarea class="input-box" id="user-input" rows="1" placeholder="Describe una actividad..."></textarea>
            <button class="send-btn" id="send-btn"><i class="bi bi-send-fill"></i></button>
        </div>
    </div>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing-indicator');
    const chatList = document.getElementById('chat-list');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');

    let userId = localStorage.getItem('montania_user_id');
    // Ya no forzamos el admin aquí para nuevos usuarios
    let isAdmin = localStorage.getItem('montania_is_admin') === 'true';

    async function init() {
        if (!userId) {
            const res = await fetch('/api/register');
            const data = await res.json();
            userId = data.userId;
            localStorage.setItem('montania_user_id', userId);
        }
        
        // Recargamos el estado de admin desde el almacenamiento local
        isAdmin = localStorage.getItem('montania_is_admin') === 'true';
        if (isAdmin) document.getElementById('admin-indicator').style.display = 'inline';
        
        await loadChatList();
        showWelcome();
    }

    let currentChatId = Date.now().toString();
    let currentHistory = [];
    let isTyping = false;

    function toggleSidebar() { sidebar.classList.toggle('open'); overlay.classList.toggle('show'); }

    async function loadChatList() {
        try {
            const res = await fetch(`/api/chats?userId=${userId}&isAdmin=${isAdmin}`);
            const chats = await res.json();
            chatList.innerHTML = '';
            chats.slice().reverse().forEach(chat => {
                const item = document.createElement('div');
                item.className = `chat-item ${chat.id === currentChatId ? 'active' : ''} ${isAdmin && chat.isOthers ? 'external' : ''}`;
                
                let content = `<i class="bi ${isAdmin && chat.isOthers ? 'bi-person-badge' : 'bi-chat-left'} me-2"></i> ${chat.title}`;
                if (isAdmin && chat.isOthers) {
                    content += `<span class="owner-id">De: ${chat.userId}</span>`;
                }
                
                item.innerHTML = content;
                item.onclick = () => { if(!isTyping) { loadChat(chat.id); if(window.innerWidth <= 768) toggleSidebar(); } };
                chatList.appendChild(item);
            });
            return chats;
        } catch (e) { return []; }
    }

    async function loadChat(id) {
        currentChatId = id;
        const res = await fetch(`/api/chats/${id}`);
        const chat = await res.json();
        currentHistory = chat.history || [];
        chatContainer.innerHTML = '';
        currentHistory.forEach(msg => appendMessage(msg.role === 'user' ? 'user' : 'assistant', msg.parts[0].text, false));
        loadChatList();
    }

    function createNewChat() {
        if(isTyping) return;
        currentChatId = Date.now().toString();
        currentHistory = [];
        chatContainer.innerHTML = '';
        showWelcome();
        loadChatList();
        if(window.innerWidth <= 768) toggleSidebar();
    }

    function showWelcome() { appendMessage('assistant', '¡Hola! Soy **MontañIA**. ' + (isAdmin ? '*(ADMIN)*' : '') + ' ¿Qué planeamos?', true); }

    function isUserAtBottom() {
        const threshold = 100; // pixels from bottom to consider "at bottom"
        return chatContainer.scrollHeight - chatContainer.scrollTop <= chatContainer.clientHeight + threshold;
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text || isTyping) return;
        isTyping = true; sendBtn.disabled = true;
        appendMessage('user', text, false);
        userInput.value = ''; userInput.style.height = 'auto';
        typingIndicator.style.display = 'flex';
        scrollToBottom();

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, history: currentHistory, chatId: currentChatId, userId: userId })
            });
            const data = await res.json();
            typingIndicator.style.display = 'none';
            if (data.response) {
                await appendMessage('assistant', data.response, true);
                currentHistory.push({ role: 'user', parts: [{ text: text }] });
                currentHistory.push({ role: 'model', parts: [{ text: data.response }] });
                loadChatList();
            }
        } catch (e) { typingIndicator.style.display = 'none'; }
        finally { isTyping = false; sendBtn.disabled = false; }
    }

    async function appendMessage(role, text, animate) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}-message`;
        const inner = document.createElement('div');
        inner.className = 'message-inner';
        const avatar = document.createElement('div');
        avatar.className = `avatar ${role}-avatar`;
        avatar.innerHTML = role === 'user' ? '<i class="bi bi-person"></i>' : '<i class="bi bi-mountains"></i>';
        const content = document.createElement('div');
        content.className = 'content';
        inner.appendChild(avatar); inner.appendChild(content); msgDiv.appendChild(inner);
        chatContainer.appendChild(msgDiv);
        
        if (isUserAtBottom()) {
            scrollToBottom();
        }

        if (role === 'assistant' && animate) {
            const words = text.split(' ');
            let currentText = '';
            for (let word of words) {
                currentText += word + ' ';
                content.innerHTML = marked.parse(currentText);
                if (isUserAtBottom()) {
                    scrollToBottom();
                }
                await new Promise(r => setTimeout(r, 20));
            }
        } else { content.innerHTML = marked.parse(text); }
    }

    userInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    userInput.addEventListener('input', () => { userInput.style.height = 'auto'; userInput.style.height = userInput.scrollHeight + 'px'; });
    sendBtn.addEventListener('click', sendMessage);
    init();
</script>

</body>
</html>
